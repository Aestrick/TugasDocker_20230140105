<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Form Input - Nasrul</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-sm mx-auto" style="max-width: 600px;">
        <div class="card-header bg-dark text-white text-center">
            <h4 class="mb-0">Form Input Mahasiswa</h4>
        </div>
        <div class="card-body p-4">
            <form action="/form" method="post" th:object="${user}">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nama Lengkap:</label>
                    <input type="text" th:field="*{nama}" class="form-control" placeholder="Contoh: Nasrul Fikri" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">NIM:</label>
                    <input type="text" th:field="*{nim}" class="form-control" placeholder="Contoh: 20230140105" required>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold d-block">Jenis Kelamin:</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" th:field="*{jenisKelamin}" value="Laki-laki" required>
                        <label class="form-check-label">Laki-laki</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" th:field="*{jenisKelamin}" value="Perempuan">
                        <label class="form-check-label">Perempuan</label>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center">
                    <button type="submit" class="btn btn-primary fw-bold px-4">Submit</button>
                    <a href="/home" class="text-decoration-none text-secondary">Kembali ke Home</a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
