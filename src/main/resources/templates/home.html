<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Home - Nasrul 20230140105</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">MY Website 20230140105</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="alert alert-success shadow-sm" role="alert">
        <h4 class="alert-heading">Selamat datang di aplikasi!</h4>
        <p class="mb-0">Aplikasi data mahasiswa temporary milik Nasrul Fikri.</p>
    </div>

    <div class="card shadow-sm mt-4">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Data Mahasiswa</h5>
            <a href="/form" class="btn btn-light btn-sm fw-bold text-primary">Input Data Mahasiswa</a>
        </div>
        <div class="card-body">
            <table class="table table-hover table-bordered text-center">
                <thead class="table-dark">
                <tr>
                    <th>No</th>
                    <th>Nama</th>
                    <th>NIM</th>
                    <th>Jenis Kelamin</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${users.empty}">
                    <td colspan="4" class="text-muted fst-italic">Belum ada data</td>
                </tr>
                <tr th:each="u, iterStat : ${users}">
                    <td th:text="${iterStat.count}">1</td>
                    <td th:text="${u.nama}">Nama</td>
                    <td th:text="${u.nim}">NIM</td>
                    <td th:text="${u.jenisKelamin}">Jenis Kelamin</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
